<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>💰 MyPay - Billetera Virtual</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #1a73e8; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 95%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-reg { background: #34a853; color: white; }
        .btn-pay { background: #1a73e8; color: white; }
        button:hover { opacity: 0.8; }
        #status { margin-top: 20px; font-weight: bold; color: #555; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MyPay App</h2>
        
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-reg" onclick="registrar()">Crear Cuenta ($1000 gratis)</button>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">
        
        <input type="number" id="monto" placeholder="Monto a pagar $">
        <button class="btn-pay" onclick="pagar()">Realizar Pago</button>
        
        <div id="status">Esperando acción...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
