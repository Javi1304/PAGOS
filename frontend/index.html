<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pagos</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        width: 400px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    textarea {
        height: 80px;
        resize: none;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #1d4ed8;
    }

    .mensaje {
        margin-top: 15px;
        padding: 10px;
        border-radius: 8px;
        display: none;
        text-align: center;
        font-weight: bold;
        background: #d1fae5;
        color: #065f46;
    }
</style>
</head>

<body>

<div class="card">
    <h2>💸 Realizar Pago</h2>

    <label>Destinatario</label>
    <input type="text" id="destinatario" placeholder="Nombre o correo electrónico">

    <label>Monto</label>
    <input type="number" id="monto" placeholder="$ 0.00">

    <label>Método de Pago</label>
    <select id="metodo">
        <option>Tarjeta de Crédito</option>
        <option>Débito</option>
        <option>Transferencia</option>
    </select>

    <label>Descripción (opcional)</label>
    <textarea placeholder="Agregar una nota..."></textarea>

    <button onclick="procesarPago()">Enviar Pago</button>

    <div id="mensaje" class="mensaje">
        ✅ Su pago fue realizado con éxito
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
